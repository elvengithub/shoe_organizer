# Pin map — BCM numbering. Adjust to your wiring.
# Steppers: STEP, DIR, ENABLE (optional tie ENABLE low on driver if unused)
steppers:
  x: { step: 17, dir: 27, enable: 22 }   # GT2 belt axis (horizontal pick)
  y: { step: 23, dir: 24, enable: 25 }   # GT2 belt axis (along slots)
  z: { step: 5, dir: 6, enable: 13 }     # T8 lead screw (vertical / in-out)

# Motion — tune after mechanical build
motion:
  # T8×8 single-start: 8 mm travel per revolution. NEMA 17 200 steps/rev @ 1/16 microstep
  z_mm_per_rev: 8.0
  z_steps_per_rev: 3200
  # GT2 belt: steps per mm = (steps_per_rev * microsteps) / (2 * pitch_mm * pulley_teeth)
  gt2_pitch_mm: 2.0
  pulley_teeth: 20
  motor_steps_per_rev: 200
  microsteps: 16
  max_feed_mm_s: 80
  z_max_feed_mm_s: 15

# Soft limit positions (mm from home); set after homing routine
limits:
  x_max: 300
  y_max: 240
  z_max: 120
  # Y centers for storage slots, same order as compartments.storage_ids (2→6). Slot 1 = cleaning bay only.
  compartment_y_mm: [35, 72, 109, 146, 183]

# Six compartments: 1 = main cleaning bay (wash / camera / mech). 2–6 = storage (env + vent + switch).
compartments:
  main_id: 1
  storage_ids: [2, 3, 4, 5, 6]
  occupancy_gpio: { 2: 16, 3: 19, 4: 26, 5: 4, 6: 14 }  # LOW = occupied — reassign BCM if pins clash with steppers
  vent_gpio: { 2: 20, 3: 21, 4: 12, 5: 15, 6: 18 }
  # Occupancy: instructor toggle — closed = occupied (GPIO LOW with pull-up)
  # DHT: optional; leave empty {} to use mock values on Pi until wired
  dht_gpio: { 2: 7, 3: 8, 4: 11, 5: 9, 6: 10 }
  # Optional Blinka names for real DHT22 (see Adafruit Pi pinout). If omitted, mock T/RH.
  dht_board_pin: { 2: "D7", 3: "D8", 4: "D11", 5: "D9", 6: "D10" }

# Camera: USB on Flask host and/or JPEG from ESP32 (MicroPython) — see README
# source: usb | esp32 | prefer_esp32  (prefer_esp32 uses ESP frame when fresh, else USB)
camera:
  source: usb
  index: 0
  width: 640
  height: 480
  esp32_frame_ttl_seconds: 3.0

# Optional: crop + CLAHE before gate, catalog, and dirt heuristics (same as reference images).
# roi: fractions of frame width/height (0–1). Omit or set null to use full frame.
# Fractions of frame (0–1). Tighter crop = less wall/floor in dirt score (fewer false “deep wash” cues).
# Set roi: null to disable cropping. Tweak x/y/w/h after you see the live view in the kiosk.
vision_preprocess:
  roi: { x: 0.20, y: 0.24, w: 0.60, h: 0.52 }
  clahe_enabled: true
  clahe_clip: 2.0
  clahe_tile: 8

# OpenCV shoe silhouette gate (server-side). Tune if real booth lighting differs.
shoe_gate:
  enabled: true
  min_contour_area_ratio: 0.025
  max_contour_area_ratio: 0.92
  min_aspect_ratio: 1.1
  max_aspect_ratio: 7.5
  min_solidity: 0.32
  bland_scene:
    enabled: true
    hard_max_laplacian_variance: 52
    min_laplacian_variance: 118
    min_edge_density: 0.026
    min_gray_std_norm: 0.038
    canny_low: 40
    canny_high: 120

# Optional ONNX shoe detector (same preprocessing idea as github.com/jmaloney95/Shoe-ObjectDetection-and-ImageClassification).
# Copy your .onnx weights under models/ and set onnx_path. If disabled or file missing, classic contour gate above is used.
shoe_object_detection:
  enabled: false
  onnx_path: models/shoe_detect.onnx
  input_name: images
  input_size: 640
  confidence_threshold: 0.5
  min_box_area_ratio: 0.015

# Block faces / skin-dominated frames from being classified as shoes (same UI: "Not a shoe.").
anti_face:
  enabled: true
  use_haar_frontal: true
  use_haar_profile: true
  haar_scale: 1.08
  haar_min_neighbors: 5
  haar_min_size: 28
  min_face_area_ratio: 0.015
  use_skin_pixel_ratio: true
  skin_ratio_reject: 0.52
  ycrcb_cr_min: 135
  ycrcb_cr_max: 180
  ycrcb_cb_min: 85
  ycrcb_cb_max: 135

# presenter.mode: camera — bay camera sees what is present; classification scope is shoes only
#   (non-shoes → "Not a shoe."). Live stream + /api/camera/analyze.
# presenter.mode: text — optional intake from POST /api/analyze description only (no camera).
presenter:
  mode: camera

# Optional overrides for text-only classification (keyword lists merged with built-ins).
text_classifier:
  default_dirt_score: 0.18
  # not_shoe_keywords: []
  # shoe_keywords: []

# ESP32 (MicroPython) environmental telemetry.
# serial.port: "auto" scans for CH340/CP210x; or set "COM6", "/dev/ttyUSB0" etc.
# compartment_id: legacy single-zone USB firmware only — which slot gets flat JSON if no "compartments" key.
# Wi-Fi multi-zone: POST {"compartments": {"2": {...}, "3": {...}}} — flash micropython/main.py (Thonny)
# secret: optional; set same string on ESP32 as header X-ESP32-Secret if non-empty.
esp32_telemetry:
  enabled: true
  compartment_id: 2
  secret: ""
  max_age_seconds: 8.0
  use_ultrasonic_occupancy: true
  serial:
    port: auto
    baud: 115200

# Flask (touch LCD shows this in Chromium kiosk)
server:
  host: 0.0.0.0
  port: 8080

# Two-stage AI pipeline (YOLOv8 crop + separate PyTorch classifiers). Off by default — enable when
# weights exist under models/ (shoe_detector.pt, shoe_type_classifier.pt, cleanliness_classifier.pt).
# Requires: pip install -r requirements-ai.txt
ai_pipeline:
  enabled: true
  # Classify the full preprocessed ROI (no YOLO crop) until you train a shoe-specific detector.
  prefer_full_roi: true
  # Normalize every captured frame to this size before detection (width, height)
  capture_normalize: [640, 480]
  detector:
    weights: models/shoe_detector.pt
    confidence: 0.35
    iou: 0.45
    imgsz: 416
    # If true and YOLO finds no box, use the full preprocessed ROI as the crop (keeps legacy behavior)
    use_full_frame_if_no_detection: true
  classifiers:
    type_weights: models/shoe_type_classifier.pt
    cleanliness_weights: models/cleanliness_classifier.pt
    backbone: mobilenet_v3_small   # mobilenet_v3_small | resnet18
    pretrained_backbone: true      # ImageNet weights when init before load_state_dict
    input_size: 224
    device: auto                   # auto | cpu | cuda
  # Subfolders of type_dir with images become class names (and fill missing type_to_bucket).
  dataset:
    type_dir: dataset/type
    sync_type_labels_from_dir: true
    use_class_order_file: true    # if dataset/type/class_order.txt exists, use that order
    class_order_file: class_order.txt
    show_dataset_class_in_ui: true # UI/API: show folder name ("brand" / style) from the type head
  # Default wash bucket for folder names not listed in type_to_bucket (also used when syncing from disk)
  type_to_bucket_default: casual
  # Fine-grained type labels (overwritten at runtime when sync_type_labels_from_dir + folders exist)
  type_class_names: [sneaker, boot, sandal, loafer, other]
  cleanliness_class_names: [clean, dirty]
  # Map each dataset/type/<folder> name → wash/UI bucket (casual | sports)
  type_to_bucket:
    sneaker: sports
    boot: casual
    sandal: casual
    loafer: casual
    other: casual
  # Extra CLAHE on the YOLO crop before classifiers (usually off — ROI preprocess already applies CLAHE)
  normalize_crop_clahe: false
  # P(dirty) thresholds → rule_based dirt_level strings (wash_decision)
  cleanliness:
    clean_if_dirty_prob_below: 0.35
    moderate_if_dirty_prob_below: 0.55
    dirty_if_dirty_prob_below: 0.75
  logging:
    log_inference_ms: false

# Decision thresholds (tune with real images)
vision:
  # OpenCV-only: sports vs casual = fused score (edges + gradient + texture + saturation); dirt from HSV + variance
  rule_based_pipeline: true
  # Legacy debug: min Canny edge fraction (shown in UI); decision uses sports_fusion_* below
  sports_edge_density_min: 0.09
  # Fusion score 0..1; sports if score >= threshold (tune with kiosk "Type" line)
  # New segmented classifier: features are computed on shoe pixels only (background excluded)
  # Lower = more sports, higher = more casual. 0.53 worked as a middle before over-tuning.
  sports_fusion_threshold: 0.53
  sports_fusion_casual_bias: 0.01
  # Minimal-palette + slim (mild) — helps USB casual vs always-sports; paired with threshold above
  casual_strength_rules_enabled: true
  casual_minimal_palette_max_variety: 3.5
  casual_minimal_palette_max_sat: 0.26
  casual_minimal_palette_boost: 0.05
  casual_minimal_palette_sports_dampen: 0.92
  casual_soft_bright_sole_on_minimal_palette: true
  casual_bright_sole_sports_add_when_minimal_palette: 0.04
  casual_slim_sole_thickness_max: 0.18
  casual_slim_width_variation_max: 0.20
  casual_slim_defects_max: 9.0
  casual_slim_max_color_variety: 3.8
  casual_slim_silhouette_boost: 0.05
  casual_slim_sports_penalty: 0.04
  rule_leather_saturation_max: 58
  rule_leather_brightness_v_max: 135
  rule_leather_edge_density_max: 0.12
  dirt_ratio_clean_below: 0.10
  dirt_ratio_moderate_below: 0.20
  dirt_ratio_dirty_below: 0.33
  dirt_blend_ratio: 0.68
  dirt_blend_std: 0.22
  dirt_blend_noise: 0.10
  dirt_hue_min: 8
  dirt_hue_max: 32
  dirt_sat_min: 20
  dirt_value_brown_min: 35
  dirt_value_brown_max: 220
  dirt_dark_v_max: 75
  dirt_dark_sat_min: 15
  dirt_edge_threshold: 0.12
  # Three-way type from camera (casual / sports / leather)
  leather_saturation_max: 52
  leather_edge_max: 0.092
  leather_gradient_max: 0.086
  # Dark leather + white sole: edges look “busy” but saturation stays low — treat as leather
  leather_muted_saturation_max: 66
  leather_min_edge_when_muted: 0.042
  # Navy/leather can look “saturated” in HSV-S; dark upper = low mean V (0–255)
  leather_brightness_v_max: 108
  sports_edge_min: 0.072
  sports_gradient_min: 0.09
  # Mean Sobel gradient — raise so brogue/stitch on leather stays below “mesh”
  sports_mesh_gradient_min: 0.140
  # Knit path also needs strong gradient OR saturation (gradient alone is not enough)
  sports_mesh_strong_gradient_min: 0.138
  sports_mesh_min_saturation: 36
  # Colorful trainer — tighter than before so tan/brown leather isn’t “color sports”
  sports_edge_color_min_gradient: 0.126
  sports_edges_require_saturation_min: 60
  # Smooth leather / rubber upper: gradient below this and not mesh → leather
  leather_safe_gradient_max: 0.132
  # Micro-texture RMS: dark/smooth leather < leather_max; sole seam < leather_sole_max; casual weave >= casual_min
  leather_max_texture_rms: 0.072
  leather_sole_max_texture_rms: 0.10
  casual_texture_rms_min: 0.048
  sports_bright_saturation_min: 70
  sports_bright_edge_min: 0.05
  # Bright smooth low-sat upper (white PU / canvas dress sneaker) → casual, not leather
  casual_synthetic_brightness_v_min: 150
  casual_synthetic_saturation_max: 58
  casual_synthetic_texture_rms_max: 0.062
  casual_synthetic_gradient_max: 0.125
  # Pebbled / tumbled leather (navy loafers, etc.): high texture — not mesh trainers
  leather_pebble_texture_rms_min: 0.048
  leather_pebble_texture_rms_max: 0.175
  leather_pebble_brightness_v_max: 148
  leather_pebble_saturation_max: 64
  # When “sports” would win but scene is muted/smooth/dark (dress or leather) — use casual, not sports
  sports_obvious_color_sat_min: 64
  sports_obvious_mesh_grad_min: 0.144
  sports_obvious_mesh_sat_min: 42
  dress_ambiguous_max_texture_rms: 0.102
  dress_ambiguous_brightness_v_max: 132
  # Gray knit: very high gradient + low saturation (above leather grain, below old loose OR-sat rule)
  sports_mesh_low_sat_gradient_min: 0.148
  sports_mesh_low_sat_min: 18

  # --- Leather / dress / muted (mapped to "casual" in rules) ---
  leather_like_detection_enabled: true
  leather_like_rule_casual_boost: 0.26
  leather_like_rule_sports_scale: 0.42
  leather_like_rule_sole_contrast_penalty: 0.06
  dirt_level:
    enabled: true
    clean_score_max: 0.24
    clean_region_max: 0.004
    dirty_score_min: 0.46
    dirty_region_min: 0.006
    very_dirty_score_min: 0.62
    very_dirty_region_min: 0.012
    edge_canny_low: 40
    edge_canny_high: 120
    edge_large_component_min_area_ratio: 0.0009

wash:
  # Lower gates = wash reacts sooner to the soil proxy (only this block tuned for wash sensitivity).
  hard_if_dirt_above: 0.50
  sports_hard_if_dirt_above: 0.40
  casual_hard_if_dirt_above: 0.42
  texture_discount:
    sports: 0.16
    casual: 0.12
    leather: 0.09
  use_dirt_level_if_available: true
  skip_wash_effective_below: 0.13
  allow_skip_wash_when_clean: true
  gentle_only_effective_below: 0.30

# Reference photos: put clean booth examples under datasets/shoe_types/casual/clean/ and
# datasets/shoe_types/sports/clean/ (same ROI + lighting as live view). If clean/ has at
# least one image for a type, only that folder is used for that type (parent-folder junk ignored).
# path: relative to this app folder. Use `../datasets/shoe_types` if you only maintain refs at repo root.
shoe_type_dataset:
  enabled: true
  path: datasets/shoe_types
  # Histogram + OpenCV vision fusion (see ai_camera + shoe_type_classifier)
  refine_rule_based_type: true
  # Subfolder name under each type; if it exists and has images, ONLY those files are references.
  reference_subfolder: clean
  # Slightly larger than shoe_catalog default so shape/color detail matches your clean refs.
  resize: 200
  # Histogram match threshold — dataset is the PRIMARY classifier, vision rules are fallback.
  min_match_score: 0.22
  # Require some separation between sports vs casual scores (reduces coin-flip errors).
  min_margin: 0.02
  # Blend Bhattacharyya distance for more noise-robust matching (clean ref vs dirtier live shoe).
  blend_bhattacharyya: true
  bhattacharyya_mix: 0.30
  # Mean of best K histogram matches per type (use 3 when you have several clean refs per type).
  top_k_refs: 3
  # Slightly less HSV / more shape–lighting than default — USB booth lighting skews color vs ref photos.
  weight_hsv: 0.36
  weight_gray: 0.28
  weight_lab: 0.36
  # If histogram picks "sports" but frame looks like leather/dress (muted), prefer "casual".
  leather_like_override_dataset_sports: true
  leather_like_histogram_gap_soft: 0.22
  leather_like_min_casual_score_flip: 0.14
  leather_like_accept_weak_casual_histogram: true
  fusion:
    enabled: true
    # Balanced mix (tune with your clean/ ref folders)
    weight_histogram: 0.38
    weight_vision: 0.47
    weight_catalog: 0.15
    vision_prior_peak: 0.70
    hist_prefers_casual_min_gap: 0.12
    penalize_sports_when_hist_prefers_casual: 0.10
    # Set gap to 0 to disable (the “always sports” run had this on — it over-pushed sports)
    hist_prefers_sports_min_gap: 0.0
    penalize_casual_when_hist_prefers_sports: 0.0
    boost_when_vision_sports: true
    extra_vision_weight_when_sports: 0.04
    sports_logit_boost: 0.08
    boost_when_vision_leather: true
    extra_vision_weight_when_leather: 0.14
    leather_logit_boost: 0.24
    boost_when_vision_casual: true
    extra_vision_weight_when_casual: 0.12
    casual_logit_boost: 0.2
    # Reduce histogram-driven “sports” when OpenCV already says casual or leather
    penalize_sports_when_vision_casual: 0.12
    penalize_sports_when_vision_leather: 0.1
    temperature: 0.5
    min_confidence: 0.48
    min_top2_margin: 0.08

# Reference images: datasets/shoes/<Category>/<StyleName>.avif (or .jpg / .png)
# Histogram fusion: HSV 2D + gray + LAB a–b (after same preprocess as live frame).
# Raise min_match_score if wrong styles win; lower slightly if nothing ever matches.
shoe_catalog:
  enabled: true
  path: datasets/shoes
  min_match_score: 0.40
  reject_if_ambiguous_below: 0.52
  min_score_margin_when_weak: 0.035
  resize: 160
  hist_h_bins: 24
  hist_s_bins: 24
  hist_gray_bins: 32
  hist_lab_bins: 16
  weight_hsv: 0.48
  weight_gray: 0.22
  weight_lab: 0.30
  blend_bhattacharyya: false
  bhattacharyya_mix: 0.25

# Phase 1: non-shoe reference images (same ROI/CLAHE as live). Empty folder = no extra rejections.
not_shoe_catalog:
  enabled: true
  path: datasets/not_shoe
  min_score_to_reject: 0.45

# Phase 2: binary shoe classifier (TFLite). Train on PC: pip install -r scripts/requirements-train.txt
#   python scripts/train_shoe_binary.py --align_preprocess
#   After training, set shoe_binary.threshold and shoe_binary.input_size from models/shoe_binary_metrics.json
#   suggested_config (do not use a fixed 0.55 without checking metrics).
# Eval: python scripts/eval_shoe_binary.py --threshold <value from metrics JSON>
shoe_binary:
  enabled: false
  model_path: models/shoe_binary.tflite
  threshold: 0.55
  input_size: 224
  strict: false
  skip_negative_gallery_after_binary: true

# Phase 1: require consecutive frames before trusting "shoe" (intake + confirmed_is_shoe in /api/camera/analyze).
# Rolling majority vote on sports | leather | casual (reduces label flicker)
shoe_type_smoothing:
  window: 5

classification_stability:
  enabled: true
  shoe_confirm_frames: 2
  not_shoe_confirm_frames: 2

# Phase 3: save preprocessed ROI when rejected as not-shoe (for dataset mining). Off by default.
debug_capture:
  enabled: false
  save_rejects: true
  path: datasets/captured_rejects
  jpeg_quality: 82
